model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
sandbox_mode = "workspace-write"

[features]
apps = false
prevent_idle_sleep = true

[notice.model_migrations]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.env_http_headers]
CONTEXT7_API_KEY = "CONTEXT7_API_KEY"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp"
bearer_token_env_var = "GITHUB_TOKEN"

[mcp_servers.github.env_http_headers]
X-MCP-Toolsets = "GITHUB_TOOLSETS"

[mcp_servers.openai_developer_docs]
url = "https://developers.openai.com/mcp"

[mcp_servers.openai_developer_docs.tools.fetch_openai_doc]
approval_mode = "approve"

[mcp_servers.openai_developer_docs.tools.list_openai_docs]
approval_mode = "approve"

[mcp_servers.openai_developer_docs.tools.search_openai_docs]
approval_mode = "approve"

[plugins."cloudflare@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[plugins."vercel@openai-curated"]
enabled = true

# project paths are parsed as plain strings, so absolute paths must be used.
# https://github.com/openai/codex/blob/8159f05/codex-rs/core/src/config_loader/mod.rs#L594-L605
# https://github.com/openai/codex/issues/11061
[projects."/Users/brendon/code"]
trust_level = "trusted"

[projects."/Users/bsmith/code"]
trust_level = "trusted"

# writable_roots are parsed as a list of AbsolutePathBuf, so tilde expansion can be used.
# https://github.com/openai/codex/blob/main/codex-rs/utils/absolute-path/src/lib.rs
# https://github.com/openai/codex/blob/f628824/codex-rs/core/src/config/types.rs#L797
[sandbox_workspace_write]
network_access = true
writable_roots = ["~/code"]

[shell_environment_policy]
inherit = "core"

[tui]
theme = "dracula"
