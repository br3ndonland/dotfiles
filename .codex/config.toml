model = "gpt-5.5"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
sandbox_mode = "workspace-write"

[analytics]
enabled = false

# GitHub plugin
# https://github.com/openai/plugins/tree/main/plugins/github
[apps.connector_76869538009648d5b282a4bb21c3d157]
default_tools_approval_mode = "approve"

[apps.connector_76869538009648d5b282a4bb21c3d157.tools.github_create_repository]
approval_mode = "prompt"

[apps.connector_76869538009648d5b282a4bb21c3d157.tools.github_label_write]
approval_mode = "prompt"

[apps.connector_76869538009648d5b282a4bb21c3d157.tools.github_mark_all_notifications_read]
approval_mode = "prompt"

[apps.connector_76869538009648d5b282a4bb21c3d157.tools.github_merge_pull_request]
approval_mode = "prompt"

[apps.connector_76869538009648d5b282a4bb21c3d157.tools.github_unstar_repository]
approval_mode = "prompt"

# Vercel plugin
# https://github.com/openai/plugins/tree/main/plugins/vercel
[apps.connector_690a90ec05c881918afb6a55dc9bbaa1]
default_tools_approval_mode = "approve"

[apps.connector_690a90ec05c881918afb6a55dc9bbaa1.tools.vercel_deploy_to_vercel]
approval_mode = "prompt"

[features]
prevent_idle_sleep = true

[marketplaces.openai-bundled]

[marketplaces.openai-primary-runtime]

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.context7.env_http_headers]
CONTEXT7_API_KEY = "CONTEXT7_API_KEY"

[mcp_servers.github]
bearer_token_env_var = "GITHUB_TOKEN"
default_tools_approval_mode = "approve"
url = "https://api.githubcopilot.com/mcp"

[mcp_servers.github.env_http_headers]
X-MCP-Toolsets = "GITHUB_TOOLSETS"

[mcp_servers.github.tools.create_repository]
approval_mode = "prompt"

[mcp_servers.github.tools.label_write]
approval_mode = "prompt"

[mcp_servers.github.tools.mark_all_notifications_read]
approval_mode = "prompt"

[mcp_servers.github.tools.merge_pull_request]
approval_mode = "prompt"

[mcp_servers.github.tools.unstar_repository]
approval_mode = "prompt"

[mcp_servers.openai_developer_docs]
default_tools_approval_mode = "approve"
url = "https://developers.openai.com/mcp"

# https://developers.openai.com/codex/app/browser
[plugins."browser-use@openai-bundled"]
enabled = false

# https://github.com/openai/plugins/tree/main/plugins/cloudflare
[plugins."cloudflare@openai-curated"]
enabled = true

# https://github.com/openai/plugins/tree/main/plugins/github
[plugins."github@openai-curated"]
enabled = true

# https://github.com/openai/plugins/tree/main/plugins/life-science-research
[plugins."life-science-research@openai-curated"]
enabled = true

# https://github.com/openai/plugins/tree/main/plugins/vercel
[plugins."vercel@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

# project paths are parsed as plain strings, so absolute paths must be used.
# https://github.com/openai/codex/blob/8159f05/codex-rs/core/src/config_loader/mod.rs#L594-L605
# https://github.com/openai/codex/issues/11061
[projects."/Users/brendon/.dotfiles"]
trust_level = "trusted"

[projects."/Users/brendon/code"]
trust_level = "trusted"

[projects."/Users/bsmith/.dotfiles"]
trust_level = "trusted"

[projects."/Users/bsmith/code"]
trust_level = "trusted"

# writable_roots are parsed as a list of AbsolutePathBuf, so tilde expansion can be used.
# https://github.com/openai/codex/blob/main/codex-rs/utils/absolute-path/src/lib.rs
# https://github.com/openai/codex/blob/f628824/codex-rs/core/src/config/types.rs#L797
[sandbox_workspace_write]
network_access = true
writable_roots = ["~/code"]

[shell_environment_policy]
inherit = "core"

[tui]
theme = "dracula"
