#:tombi schema.strict = false

[settings]
# https://mise.jdx.dev/configuration/settings.html
activate_aggressive = true
idiomatic_version_file_enable_tools = [
  "go",
  "node",
  "opentofu",
  "python",
  "ruby",
  "terraform",
  "terragrunt",
]
# set minimum release age
# https://mise.jdx.dev/configuration/settings.html#install_before
install_before = "7d"
# disable telemetry
# https://mise.jdx.dev/configuration/settings.html#use_versions_host_track
# https://github.com/jdx/mise/pull/7289
# https://github.com/jdx/mise/discussions/8107
use_versions_host = false
use_versions_host_track = false

[settings.pipx]
# https://mise.jdx.dev/dev-tools/backends/pipx.html
# use uvx instead of pipx
uvx = true

[settings.python]
# use precompiled binaries instead of building Python from source
# precompiled binaries are supported by Astral
# https://github.com/astral-sh/python-build-standalone
# https://mise.jdx.dev/lang/python.html#precompiled-python-binaries
compile = false
precompiled_flavor = "install_only"

[settings.ruby]
# https://mise.jdx.dev/lang/ruby.html
compile = false

[tasks.check]
depends = ["prettier:check", "shellcheck", "shfmt:check", "tombi:check"]
description = "Run code quality checks"

[tasks.format]
depends = ["prettier:format", "shfmt:format", "tombi:format"]
description = "Run code formatters"

[tasks."prettier:check"]
description = "Check web code formatting with Prettier"
run = "prettier --check ."

[tasks."prettier:format"]
description = "Format web code with Prettier"
run = "prettier --write ."

[tasks.shellcheck]
description = "Check shell scripts with ShellCheck"
run = "scripts/shellcheck.sh"

[tasks.shellcheck.env]
SHELLCHECK_OPTS = "-e SC1071 -e SC1090 -e SC1091"

[tasks."shfmt:check"]
description = "Check shell script formatting with shfmt"
run = "scripts/shfmt.sh check"

[tasks."shfmt:format"]
description = "Format shell scripts with shfmt"
run = "scripts/shfmt.sh format"

[tasks."tombi:check"]
description = "Check TOML formatting with Tombi"
run = "scripts/tombi.sh check"

[tasks."tombi:format"]
description = "Format TOML files with Tombi"
run = "scripts/tombi.sh format"

[tools]
# https://mise.jdx.dev/configuration.html#scopes
# https://mise.jdx.dev/dev-tools/
#
# signature verification tools
cosign = "prefix:3"
slsa-verifier = "prefix:2"
# registry tools from core backend
bun = "1"
go = "1"
node = [
  "22",
  # pin Node.js 24 to avoid GPG issue on GitHub Actions runners
  # https://github.com/nodejs/node/issues/61022
  "24.11.1",
]
python = [
  "3.13",
  "3.14",
]
ruby = "3"
rust = "latest"
# registry tools from other backends
# amazon-ecr-credential-helper = "latest"
# argocd = "prefix:3"
# aws-iam-authenticator = "latest"
# awscli = "prefix:2"
# eksctl = "latest"
gh = "latest"
helm = "prefix:3"
jq = "latest"
k9s = "latest"
# kubeconform = "latest"
kubectl = "prefix:1"
minikube = "latest"
# opa = "prefix:1"
opentofu = "prefix:1.11"
pipx = "prefix:1.11"
pnpm = "latest"
rclone = "latest"
# regal = "latest"
ruff = "prefix:0.15"
shellcheck = "prefix:0.11"
shfmt = "prefix:3.13"
# spacectl = "latest"
terraform-docs = "latest"
terragrunt = "latest"
uv = "prefix:0.11"
# vault = "prefix:1.20"
yt-dlp = "latest"
# non-registry tools from specific backends
"github:runkids/skillshare" = "prefix:0.18"
"npm:@kilocode/cli" = "latest"
"npm:prettier" = "prefix:3"
"npm:typescript" = "prefix:5"
# "npm:vercel" = "prefix:50"
"pipx:basedpyright" = "prefix:1"
"pipx:crp" = "latest"
"pipx:hatch" = "prefix:1.16"
"pipx:tombi" = "latest"
"pipx:torf-cli" = "latest"
